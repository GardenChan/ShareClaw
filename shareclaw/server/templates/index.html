<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F7F8FA;
  --white:#FFFFFF;
  --text:#1A1A2E;
  --text-2:#5A5A72;
  --text-3:#9999AD;
  --accent:#E53935;
  --accent-light:#FFEBEE;
  --accent-hover:#C62828;
  --green:#10B981;
  --green-light:#ECFDF5;
  --green-text:#065F46;
  --red:#E53935;
  --red-light:#FFEBEE;
  --red-text:#B71C1C;
  --amber:#F59E0B;
  --amber-light:#FFFBEB;
  --border:#E8E8EE;
  --border-focus:#E53935;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 10px 25px rgba(0,0,0,.07),0 4px 10px rgba(0,0,0,.04);
  --radius:16px;
  --radius-sm:10px;
  --sans:'Noto Sans SC','Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Menlo',monospace;
}
body{
  font-family:var(--sans);
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  -webkit-font-smoothing:antialiased;
}
.container{width:100%;max-width:400px}

/* ===== 品牌区 ===== */
.brand{text-align:center;margin-bottom:28px}
.brand-logo{width:88px;height:88px;margin-bottom:12px;border-radius:20px}
.brand-name{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px}
.brand-slogan{font-size:14px;color:var(--accent);font-weight:500}

/* ===== 卡片 ===== */
.card{
  background:var(--white);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
  transition:box-shadow .3s ease;
}
.card.active{box-shadow:var(--shadow-lg)}
.card.done{box-shadow:0 0 0 2px var(--green),var(--shadow)}
.card.error{box-shadow:0 0 0 2px var(--red),var(--shadow)}

.card-body{padding:28px 24px}

/* ===== 空闲态 ===== */
.welcome{text-align:center}
.welcome h2{font-size:18px;font-weight:600;margin-bottom:6px;color:var(--text)}
.welcome p{font-size:13px;color:var(--text-3);line-height:1.6;margin-bottom:20px}

/* 输入区 */
.input-group{margin-bottom:12px;text-align:left}
.input-group label{display:block;font-size:12px;color:var(--text-3);margin-bottom:5px;font-weight:500}
.input-field{
  width:100%;padding:11px 14px;
  background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:14px;color:var(--text);font-family:var(--sans);
  transition:border-color .2s,box-shadow .2s;
  outline:none;
}
.input-field:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(229,57,53,.1)}
.input-field::placeholder{color:var(--text-3)}
.input-field.mono{font-family:var(--mono);font-size:13px;letter-spacing:.5px}
.input-hint{font-size:11px;color:var(--text-3);margin-top:4px}

/* ===== 按钮 ===== */
.btn-area{padding:0 24px 24px}
.btn{
  width:100%;padding:13px 20px;border:none;
  border-radius:var(--radius-sm);
  font-family:var(--sans);font-size:15px;font-weight:600;
  cursor:pointer;transition:all .15s ease;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 4px 14px rgba(229,57,53,.3)}
.btn-primary:active{transform:translateY(0);box-shadow:none}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn svg{width:16px;height:16px;flex-shrink:0}

/* ===== 进度态 ===== */
.progress-view{display:none}
.progress-view.visible{display:block}

.track{height:4px;background:var(--border);border-radius:2px;margin-bottom:16px;overflow:hidden}
.track-fill{height:100%;width:0;border-radius:2px;background:var(--accent);transition:width .5s ease}
.track-fill.done{background:var(--green)}
.track-fill.error{background:var(--red)}

.stage-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.stage-text{font-size:14px;color:var(--text-2)}
.stage-pct{font-family:var(--mono);font-size:13px;color:var(--text-3);font-weight:500}

/* ===== 二维码 ===== */
.qr-area{max-height:0;opacity:0;overflow:hidden;transition:all .4s ease;margin-bottom:0}
.qr-area.visible{max-height:600px;opacity:1;margin-bottom:16px}
.qr-box{
  background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);
  padding:20px 16px;text-align:center;
}
.qr-box.scanning{border-color:var(--accent);background:var(--accent-light)}
.qr-label{font-size:13px;color:var(--text-2);margin-bottom:12px;font-weight:500}
.qr-code{white-space:pre;font-family:var(--mono);font-size:4px;line-height:1.05;letter-spacing:.8px;color:var(--text);display:inline-block;padding:8px;background:var(--white);border-radius:8px;border:1px solid var(--border)}
#qrCanvas{display:inline-block}
#qrCanvas img,#qrCanvas canvas{border-radius:8px;max-width:220px;max-height:220px}
.qr-link{margin-top:12px;padding:8px 12px;background:var(--white);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:border-color .2s}
.qr-link:hover{border-color:var(--accent)}
.qr-link-icon{flex-shrink:0;width:14px;height:14px;color:var(--text-3)}
.qr-link-url{flex:1;font-family:var(--mono);font-size:10px;color:var(--accent);word-break:break-all;text-align:left;text-decoration:none;line-height:1.4}
.qr-link-copy{flex-shrink:0;font-size:10px;color:var(--text-3);font-weight:500;white-space:nowrap}
.qr-tip{margin-top:10px;font-size:12px;color:var(--text-3)}

/* ===== 结果 ===== */
.result{max-height:0;opacity:0;overflow:hidden;transition:all .4s ease;margin-bottom:0}
.result.visible{max-height:150px;opacity:1;margin-bottom:16px}
.result-box{padding:14px 16px;border-radius:var(--radius-sm);display:flex;align-items:center;gap:10px}
.result-box.success{background:var(--green-light);color:var(--green-text)}
.result-box.error{background:var(--red-light);color:var(--red-text)}
.result-icon{flex-shrink:0;width:24px;height:24px}
.result-icon svg{width:24px;height:24px}
.result-body{flex:1}
.result-title{font-size:14px;font-weight:600;margin-bottom:2px}
.result-desc{font-size:12px;opacity:.75;line-height:1.4}

/* ===== 加载 ===== */
.spinner{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== 底部 ===== */
.footer{text-align:center;margin-top:20px;font-size:11px;color:var(--text-3);display:flex;align-items:center;justify-content:center;gap:12px}
.footer a{color:var(--accent);text-decoration:none;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.footer a:hover{text-decoration:underline}
.footer a svg{width:13px;height:13px}
.footer-sep{color:var(--border)}

/* ===== 响应式 ===== */
@media(max-width:480px){
  body{padding:16px;align-items:flex-start;padding-top:40px}
  .container{max-width:100%}
  .card-body{padding:24px 20px}
  .btn-area{padding:0 20px 20px}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>
<div class="container">

  <div class="brand">
    <img src="/logo.png" alt="ShareClaw" class="brand-logo">
    <div class="brand-name">拼虾虾</div>
    <div class="brand-slogan">拼着养更划算</div>
  </div>

  <div class="card" id="card">
    <div class="card-body">

      <!-- 欢迎态 -->
      <div class="welcome" id="welcomeView">
        <h2>接入你的微信</h2>
        <p>扫码即可让 AI 助手接入你的微信，和朋友共享一只虾</p>

        <div class="input-group">
          <label>你的昵称</label>
          <input type="text" class="input-field" id="inputName" placeholder="输入昵称，方便大家认识你">
        </div>

        <div class="input-group" id="inviteGroup">
          <label>邀请码</label>
          <input type="text" class="input-field mono" id="inputInvite" placeholder="粘贴虾主分享的邀请码">
          <div class="input-hint">没有邀请码？找虾主要一个吧</div>
        </div>
      </div>

      <!-- 进度态 -->
      <div class="progress-view" id="progressView">
        <div class="track"><div class="track-fill" id="trackFill"></div></div>
        <div class="stage-row">
          <div class="stage-text" id="stageText">准备中...</div>
          <div class="stage-pct" id="stagePct">0%</div>
        </div>

        <div class="qr-area" id="qrArea">
          <div class="qr-box" id="qrBox">
            <div class="qr-label">用微信扫一扫下面的二维码</div>
            <div id="qrCanvas" style="display:none;margin:0 auto"></div>
            <div class="qr-code" id="qrCode" style="display:none"></div>
            <div class="qr-link" id="qrLink" style="display:none" onclick="copyQrUrl()">
              <svg class="qr-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
              <a class="qr-link-url" id="qrLinkUrl" href="#" target="_blank" rel="noopener" onclick="event.stopPropagation()"></a>
              <span class="qr-link-copy">复制</span>
            </div>
            <div class="qr-tip">扫码后在微信上点确认就好啦</div>
          </div>
        </div>

        <div class="result" id="result">
          <div class="result-box" id="resultBox">
            <div class="result-icon" id="resultIcon"></div>
            <div class="result-body">
              <div class="result-title" id="resultTitle"></div>
              <div class="result-desc" id="resultDesc"></div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <div class="btn-area">
      <button class="btn btn-primary" id="actionBtn" onclick="startSync()">
        开始接入
      </button>
    </div>
  </div>

  <div class="footer">
    <a href="/dashboard">我是虾主</a>
    <span class="footer-sep">·</span>
    <a href="https://github.com/GardenChan/ShareClaw" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      GitHub
    </a>
  </div>
</div>

<script>
/* SVG 图标模板 */
const ICON_SUCCESS = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
const ICON_ERROR = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
const ICON_REFRESH = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>';

const STAGE = {
  init:              {text:'正在准备环境...',      pct:8},
  backend_ready:     {text:'连接成功',             pct:18},
  selecting_instance:{text:'正在寻找最佳服务器...', pct:25},
  query_status:      {text:'正在检查当前状态...',   pct:30},
  evict:             {text:'正在腾出位置...',       pct:45},
  isolation_cleanup: {text:'正在清理旧账号配置...', pct:48},
  prerequisites:     {text:'正在检查前置条件...',   pct:52},
  qrcode:            {text:'请扫码登录微信',       pct:55},
  login_complete:    {text:'登录成功，正在部署...', pct:70},
  enqueue:           {text:'你的微信已加入队列',   pct:80},
  isolation_setup:   {text:'正在配置独立 Agent...', pct:85},
  restart_gateway:   {text:'正在启动服务...',       pct:90},
  done:              {text:'搞定！',               pct:100},
};

/* 自动读取 URL 邀请码 */
(function(){
  const p = new URLSearchParams(location.search);
  const inv = p.get('invite');
  if(inv) document.getElementById('inputInvite').value = inv;
})();

/* UI 工具 */
function setTrack(p){document.getElementById('trackFill').style.width=p+'%';document.getElementById('stagePct').textContent=p+'%'}
function setText(t){document.getElementById('stageText').textContent=t}
function setCard(s){document.getElementById('card').className='card'+(s?' '+s:'')}
function showQR(d){
  console.log('[ShareClaw] QR raw data length:', d.length);
  console.log('[ShareClaw] QR raw data:', d);

  /* 解析原始数据：提取链接 */
  const lines = d.split('\n');
  let url = '';

  for(const line of lines){
    const trimmed = line.trim();
    /* 匹配各种 URL 格式：直接 URL、冒号后 URL 等 */
    const m = trimmed.match(/(https?:\/\/[^\s'"<>]+)/);
    if(m){
      url = m[1];
      /* 去掉尾部可能的标点 */
      url = url.replace(/[.,;:!?。，；：！？]+$/, '');
      console.log('[ShareClaw] Found URL:', url);
      break;
    }
  }

  if(!url){
    console.warn('[ShareClaw] No URL found in QR data, will fall back to text QR');
  }

  const canvasEl = document.getElementById('qrCanvas');
  const qrEl = document.getElementById('qrCode');

  /* 优先用 URL 生成图片二维码 */
  if(url && typeof QRCode !== 'undefined'){
    canvasEl.innerHTML='';
    canvasEl.style.display='inline-block';
    qrEl.style.display='none';
    try{
      new QRCode(canvasEl, {
        text: url,
        width: 220,
        height: 220,
        colorDark: '#1A1A2E',
        colorLight: '#FFFFFF',
        correctLevel: QRCode.CorrectLevel.M,
      });
      console.log('[ShareClaw] QRCode image rendered OK');
    }catch(e){
      console.error('[ShareClaw] QRCode render failed:', e);
      canvasEl.style.display='none';
      _showTextQR(d, lines, qrEl);
    }
  } else {
    canvasEl.style.display='none';
    _showTextQR(d, lines, qrEl);
  }

  /* 展示链接 */
  const linkEl = document.getElementById('qrLink');
  const linkUrlEl = document.getElementById('qrLinkUrl');
  if(url){
    linkUrlEl.href = url;
    linkUrlEl.textContent = url;
    linkEl.style.display = 'flex';
    window._qrUrl = url;
  } else {
    linkEl.style.display = 'none';
  }

  document.getElementById('qrBox').classList.add('scanning');
  document.getElementById('qrArea').classList.add('visible');
}

function _showTextQR(d, lines, qrEl){
  qrEl.style.display='inline-block';
  const qrLines = [];
  for(const line of lines){
    const trimmed = line.trim();
    if(/[█▀▄▌▐░▒▓\u2580-\u259F\u2588]/.test(trimmed) && trimmed.length > 5){
      qrLines.push(line);
    }
  }
  if(qrLines.length > 0){
    qrEl.textContent = qrLines.join('\n');
  } else {
    const filtered = lines.filter(l => {
      const t = l.trim();
      return t && !t.startsWith('使用微信') && !t.startsWith('如果二维码') && !t.startsWith('等待连接');
    });
    qrEl.textContent = filtered.join('\n');
  }
}
function copyQrUrl(){
  if(!window._qrUrl) return;
  const el = document.querySelector('.qr-link-copy');
  const onOk = ()=>{ el.textContent='已复制'; setTimeout(()=>{el.textContent='复制'},1500); };
  const onFail = ()=>{ el.textContent='复制失败'; setTimeout(()=>{el.textContent='复制'},1500); };
  /* 优先 Clipboard API（仅 HTTPS / localhost 可用） */
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(window._qrUrl).then(onOk).catch(()=>fallbackCopy(window._qrUrl)?onOk():onFail());
  } else {
    fallbackCopy(window._qrUrl) ? onOk() : onFail();
  }
}
function fallbackCopy(text){
  try{
    const ta=document.createElement('textarea');
    ta.value=text; ta.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0';
    document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0,text.length);
    const ok=document.execCommand('copy');
    document.body.removeChild(ta); return ok;
  }catch(e){return false}
}
function hideQR(){
  document.getElementById('qrBox').classList.remove('scanning');
  document.getElementById('qrArea').classList.remove('visible');
  document.getElementById('qrCanvas').style.display='none';
  document.getElementById('qrCode').style.display='none';
}
function showResult(type,iconSvg,title,desc){
  const box=document.getElementById('resultBox');
  box.className='result-box '+type;
  document.getElementById('resultIcon').innerHTML=iconSvg;
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultDesc').textContent=desc;
  document.getElementById('result').classList.add('visible');
}

function startSync(){
  const name=(document.getElementById('inputName').value||'').trim();
  if(!name){
    document.getElementById('inputName').style.borderColor='var(--red)';
    document.getElementById('inputName').setAttribute('placeholder','请输入昵称后再开始');
    document.getElementById('inputName').focus();
    return;
  }
  document.getElementById('inputName').style.borderColor='';

  const btn=document.getElementById('actionBtn');
  btn.disabled=true;
  btn.innerHTML='<div class="spinner"></div> 接入中...';

  document.getElementById('welcomeView').style.display='none';
  const pv=document.getElementById('progressView');
  pv.style.display='block';
  pv.classList.add('visible');
  /* 重置：恢复进度条/百分比（上次失败可能被隐藏） */
  document.querySelector('.track').style.display='';
  document.getElementById('stagePct').style.display='';
  document.getElementById('trackFill').className='track-fill';
  document.getElementById('trackFill').style.width='0';
  document.getElementById('result').classList.remove('visible');
  hideQR();
  setCard('active');
  setText('正在连接...');
  setTrack(0);

  const invite=(document.getElementById('inputInvite').value||'').trim();
  const userId=name;
  const q=new URLSearchParams();
  q.set('user_id',userId);
  q.set('user_name',name);
  if(invite)q.set('invite',invite);

  const es=new EventSource('/rotate?'+q);

  es.addEventListener('progress',function(e){
    const d=JSON.parse(e.data);
    const s=STAGE[d.stage]||{text:d.message,pct:0};
    setTrack(s.pct);
    setText(s.text);
    if(d.stage==='login_complete')hideQR();
  });

  es.addEventListener('qrcode',function(e){
    const d=JSON.parse(e.data);
    setTrack(STAGE.qrcode.pct);
    setText(STAGE.qrcode.text);
    showQR(d.data);
  });

  es.addEventListener('done',function(e){
    es.close();hideQR();
    document.getElementById('trackFill').classList.add('done');
    setTrack(100);setText('搞定！');
    setCard('done');
    showResult('success',ICON_SUCCESS,'接入成功！','你的微信已连接 AI 助手，可以开始使用了');
    btn.disabled=false;
    btn.innerHTML='返回';
    btn.onclick=function(){ location.reload(); };
  });

  es.addEventListener('error',function(e){
    try{
      const d=JSON.parse(e.data);
      es.close();hideQR();
      /* 失败时隐藏进度条和百分比 */
      document.querySelector('.track').style.display='none';
      document.getElementById('stagePct').style.display='none';
      setCard('error');setText('出了点问题');
      const msg = d.message||'请稍后再试一下';
      showResult('error',ICON_ERROR,'接入失败',msg);
      /* 邀请码相关错误：按钮改为"换个邀请码"，回到欢迎页 */
      const isInviteErr = /邀请码/.test(msg);
      btn.disabled=false;
      if(isInviteErr){
        btn.innerHTML='换个邀请码';
        btn.onclick=function(){ location.reload(); };
      } else {
        btn.innerHTML=ICON_REFRESH+' 重新试试';
      }
    }catch(_){es.close();btn.disabled=false;btn.innerHTML=ICON_REFRESH+' 重新试试';}
  });
}
</script>
</body>
</html>
